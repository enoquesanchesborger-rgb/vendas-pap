<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard - Vendas PAP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#004782",
                        "primary-container": "#185fa5",
                        "on-surface-variant": "#424751",
                        "surface": "#faf8ff",
                        "background": "#faf8ff",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- Top Navigation -->
    <header class="bg-white border-b border-slate-200 shadow-sm flex justify-between items-center px-4 py-3 w-full sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary-container text-2xl" data-icon="sell">sell</span>
            <span class="text-xl font-bold text-[#185FA5]">Vendas PAP</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="h-8 w-8 rounded-full bg-blue-100 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-sm" data-icon="person">person</span>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto max-w-lg px-4 py-8 space-y-8">
        <!-- Welcome Section -->
        <section class="space-y-1">
            <h1 class="text-2xl font-bold text-primary">Olá, Consultor!</h1>
            <p class="text-on-surface-variant">Pronto para mais um dia de vendas?</p>
        </section>

        <!-- Quick Actions -->
        <section class="grid grid-cols-2 gap-4">
            <a href="cadastro.html" class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm border border-slate-100 hover:bg-slate-50 transition-colors gap-3">
                <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-3xl" data-icon="add_circle">add_circle</span>
                </div>
                <span class="font-semibold text-primary">Nova Venda</span>
            </a>
            <a href="admin.html" class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm border border-slate-100 hover:bg-slate-50 transition-colors gap-3">
                <div class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center text-green-600">
                    <span class="material-symbols-outlined text-3xl" data-icon="history">history</span>
                </div>
                <span class="font-semibold text-slate-700">Minhas Vendas</span>
            </a>
        </section>

        <!-- Performance Summary -->
        <section class="grid grid-cols-2 gap-4">
            <div class="bg-[#185FA5] text-white p-5 rounded-2xl shadow-lg flex flex-col gap-1">
                <span class="text-[10px] uppercase font-bold opacity-80 tracking-wider">Vendas Hoje</span>
                <div class="flex items-baseline gap-1">
                    <span id="vendasHoje" class="text-3xl font-black">0</span>
                    <span class="text-xs opacity-70">unid.</span>
                </div>
                <div class="mt-2 w-full bg-white/20 h-1.5 rounded-full overflow-hidden">
                    <div class="bg-white h-full" style="width: 40%"></div>
                </div>
            </div>
            <div class="bg-emerald-600 text-white p-5 rounded-2xl shadow-lg flex flex-col gap-1">
                <span class="text-[10px] uppercase font-bold opacity-80 tracking-wider">Minha Comissão</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-sm font-bold">R$</span>
                    <span id="comissaoTotal" class="text-3xl font-black">0,00</span>
                </div>
                <div class="mt-2 flex items-center gap-1 text-[10px] bg-white/20 w-fit px-2 py-0.5 rounded-full">
                    <span class="material-symbols-outlined text-[12px]">trending_up</span>
                    + R$ 10,00 cada
                </div>
            </div>
        </section>

        <!-- Meta Progress -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
            <div class="flex justify-between items-center">
                <span class="font-bold text-slate-700">Meta Mensal</span>
                <span class="text-xs font-bold text-primary px-2 py-1 bg-blue-50 rounded-lg">75% concluída</span>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between items-end">
                    <span class="text-2xl font-black text-slate-800">R$ 15.400</span>
                    <span class="text-xs text-slate-400 font-medium">Alvo: R$ 20.000</span>
                </div>
                <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                    <div class="bg-primary h-full rounded-full" style="width: 75%"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Nav (Mobile) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center py-3 px-6 md:hidden">
        <button class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined" data-icon="home">home</span>
            <span class="text-[10px] font-bold">Início</span>
        </button>
        <a href="cadastro.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined" data-icon="add_box">add_box</span>
            <span class="text-[10px]">Cadastrar</span>
        </a>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined" data-icon="list_alt">list_alt</span>
            <span class="text-[10px]">Vendas</span>
        </button>
        <a href="admin.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined" data-icon="settings">settings</span>
            <span class="text-[10px]">Gerenciar</span>
        </a>
    </nav>
    <div class="h-16 md:hidden"></div>

    <script>
        // Load stats from localStorage
        function loadStats() {
            const stats = JSON.parse(localStorage.getItem('vendedor_stats') || '{"vendas": 0, "comissao": 0}');
            document.getElementById('vendasHoje').textContent = stats.vendas;
            document.getElementById('comissaoTotal').textContent = stats.comissao.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
