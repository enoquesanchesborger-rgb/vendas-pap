            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
        body {
            min-height: max(884px, 100dvh);
        }

<body class="bg-background text-on-background min-h-screen font-body-md">
    <!-- TopAppBar -->
    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm dark:shadow-none docked full-width top-0 sticky z-50 flex justify-between items-center px-4 py-3 w-full">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 p-2 rounded-full transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-[#185FA5] dark:text-blue-400 font-['Inter'] antialiased tracking-tight">Vendas PAP</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
                <img alt="Foto do Vendedor" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtYIhPw1tUPd-QtsWqXsBO18JKNoOZgG-ZlIjC6Z_ie6QhnqRV9GABeO4fRDJE3J20lA92A_VE2xoXQcT_qZpyz8Q8nLLv4S9V8V1tmTFdo99pHN9hyiN9mp7m2ycbg4Xq1g_WVgLUkJnppVHMSM7w8pRdATGTnVVivmSnpXMypOrECTMAagtiAb3Rjf7CBJS9Hxo34N6VFr8szeYw5iOLo1lvRC3sTV1kxqtasBfyTW-hyAZDqg62POj6WpfRUQ3UUrTuqCSacQ"/>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-margin py-lg space-y-lg">
        <!-- Progress Section -->
        <section class="space-y-sm">
            <div class="flex justify-between items-end">
                <div>
                    <span class="text-label-sm font-label-sm text-outline uppercase tracking-wider">Passo 02 de 04</span>
                    <h2 class="text-headline-md font-headline-md text-on-surface">Endereço da Venda</h2>
                </div>
                <span class="text-headline-sm font-headline-sm text-primary">50%</span>
            </div>
            <div class="w-full bg-surface-container rounded-full h-2 overflow-hidden">
                <div class="bg-primary h-full rounded-full transition-all duration-500" style="width: 50%"></div>
            </div>
        </section>

        <!-- Address Form -->
        <form id="addressForm" class="space-y-md">
            <!-- CEP Field -->
            <div class="space-y-xs">
                <label class="text-label-md font-label-md text-on-surface-variant" for="cep">CEP</label>
                <div class="relative">
                    <input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 text-body-lg focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition-all" id="cep" maxlength="9" name="cep" placeholder="00000-000" type="text" required/>
                    <button type="button" id="btnSearchCep" class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline hover:text-primary transition-colors">search</button>
                </div>
            </div>

            <!-- Bento Grid for Address Data -->
            <div class="grid grid-cols-6 gap-md">
                <div class="col-span-6 space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface-variant" for="rua">Rua / Logradouro</label>
                    <input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 text-body-lg text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition-all" id="rua" name="rua" type="text" placeholder="Avenida Paulista" required/>
                </div>
                <div class="col-span-2 space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface-variant" for="numero">Número</label>
                    <input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 text-body-lg focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition-all" id="numero" name="numero" placeholder="123" type="text" required/>
                </div>
                <div class="col-span-4 space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface-variant" for="bairro">Bairro</label>
                    <input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 text-body-lg text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition-all" id="bairro" name="bairro" type="text" placeholder="Bela Vista" required/>
                </div>
                <div class="col-span-6 space-y-xs">
                    <label class="text-label-md font-label-md text-on-surface-variant" for="cidade">Cidade</label>
                    <input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 text-body-lg text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition-all" id="cidade" name="cidade" type="text" placeholder="São Paulo - SP" required/>
                </div>
            </div>

            <!-- Reference Point -->
            <div class="space-y-xs">
                <label class="text-label-md font-label-md text-on-surface-variant" for="referencia">Ponto de Referência</label>
                <textarea class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 text-body-md focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition-all resize-none" id="referencia" name="referencia" placeholder="Ex: Próximo ao metrô, portão azul..." rows="2"></textarea>
            </div>

            <!-- Map Location Assistant -->
            <div class="bg-surface-container rounded-2xl p-md border border-outline-variant/30 space-y-md">
                <div class="flex items-start gap-md">
                    <div class="bg-primary/10 p-sm rounded-lg">
                        <span class="material-symbols-outlined text-primary">location_on</span>
                    </div>
                    <div>
                        <h3 class="text-body-lg font-headline-sm text-on-surface">Confirmar no Mapa</h3>
                        <p class="text-label-md text-on-surface-variant">Ajuste a localização para garantir a entrega correta.</p>
                    </div>
                </div>
                <div class="relative h-32 w-full rounded-xl overflow-hidden bg-slate-200">
                    <img alt="Mapa da Região" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDRcYf7sucpoLP3C46NMtukDRT716v4wU4nQqfx9sg4QRW6yeKcsqP-CWwIRv5ar2-6-nnDYGA1bkfcOS1LtgqQo2_ixbSVHSalHJ3YfEbD28JY9dmei2b2W2YO_nvFJX2-DQYnIed7vze26bJScH6zIma-SHmoaXFPevdk_rmGEu1KmKY8gpJn7Z2EQBtSg9r35qSwXSDiDMyqDr4ZUxWK59YY8hkKFq40FbaHRuxN6hzw0nu0l1Uxz_5xhgidLUbbzWr49strww"/>
                    <div class="absolute inset-0 flex items-center justify-center bg-black/10">
                        <button type="button" id="btnCurrentLocation" class="bg-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 hover:bg-slate-50 transition-colors active:scale-95">
                            <span class="material-symbols-outlined text-primary text-sm">my_location</span>
                            <span class="text-label-md text-primary font-bold">Localização Atual</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Navigation Actions -->
            <div class="pt-lg pb-xl grid grid-cols-2 gap-md">
                <button type="button" onclick="window.history.back()" class="w-full py-4 px-6 rounded-xl border border-outline text-outline font-headline-sm hover:bg-surface-container-low active:scale-95 transition-all">
                    Voltar
                </button>
                <button type="submit" class="w-full py-4 px-6 rounded-xl bg-primary text-white font-headline-sm shadow-md active:scale-95 transition-all">
                    Próximo
                </button>
            </div>
        </form>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 right-0 h-16 flex justify-around items-center px-4 pb-safe z-50 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] rounded-t-xl">
        <a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1 scale-95 active:scale-90 transition-transform duration-150" href="dashboard.html">
            <span class="material-symbols-outlined">home</span>
            <span class="font-['Inter'] text-[12px] font-medium">Início</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#185FA5] dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 rounded-xl px-3 py-1 scale-95 active:scale-90 transition-transform duration-150" href="#">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span class="font-['Inter'] text-[12px] font-medium">Vendas</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1 scale-95 active:scale-90 transition-transform duration-150" href="#">
            <span class="material-symbols-outlined">group</span>
            <span class="font-['Inter'] text-[12px] font-medium">Leads</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1 scale-95 active:scale-90 transition-transform duration-150" href="#">
            <span class="material-symbols-outlined">menu</span>
            <span class="font-['Inter'] text-[12px] font-medium">Menu</span>
        </a>
    </nav>

    <script>
        // CEP Masking
        const cepInput = document.getElementById('cep');
        cepInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 8) value = value.slice(0, 8);
            value = value.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        });

        // Mock Address Search
        document.getElementById('btnSearchCep').addEventListener('click', () => {
            const cep = cepInput.value.replace(/\D/g, '');
            if (cep.length === 8) {
                // Mocking an API call
                document.getElementById('rua').value = 'Avenida Paulista';
                document.getElementById('bairro').value = 'Bela Vista';
                document.getElementById('cidade').value = 'São Paulo - SP';
                alert('Endereço encontrado para o CEP ' + cep);
            } else {
                alert('Por favor, digite um CEP válido.');
            }
        });

        // Current Location logic
        document.getElementById('btnCurrentLocation').addEventListener('click', () => {
            if ("geolocation" in navigator) {
                const btn = document.getElementById('btnCurrentLocation');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="material-symbols-outlined text-primary text-sm animate-spin">refresh</span><span class="text-label-md text-primary font-bold">Obtendo...</span>';
                
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // In a real app, you would use Reverse Geocoding to fill the address fields
                    // For this prototype, we'll simulate opening the location
                    alert(`Localização capturada!\nLat: ${lat}\nLng: ${lng}\n\nEm um ambiente real, o endereço seria preenchido automaticamente.`);
                    
                    // Update the button to show success
                    btn.innerHTML = '<span class="material-symbols-outlined text-secondary text-sm">check_circle</span><span class="text-label-md text-secondary font-bold">Localizado</span>';
                    
                    // Update mock address fields to simulate auto-fill
                    document.getElementById('rua').value = 'Localização Atual (GPS)';
                    document.getElementById('bairro').value = 'Bairro detectado';
                    document.getElementById('cidade').value = 'Cidade detectada';
                }, (error) => {
                    alert('Erro ao obter localização: ' + error.message);
                    btn.innerHTML = originalText;
                });
            } else {
                alert("Geolocalização não é suportada pelo seu navegador.");
            }
        });

        // Form submission logic
        const addressForm = document.getElementById('addressForm');
        addressForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Save data to localStorage
            const addressData = {
                cep: document.getElementById('cep').value,
                rua: document.getElementById('rua').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                referencia: document.getElementById('referencia').value
            };
            localStorage.setItem('cadastro_endereco', JSON.stringify(addressData));
            
            window.location.href = 'cadastro_etapa3.html';
        });
    </script>
</body>
</html>
