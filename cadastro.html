<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cadastro - Vendas PAP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#dae2fd",
                        "outline": "#727782",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "on-tertiary-fixed": "#0b1c30",
                        "surface-bright": "#faf8ff",
                        "surface-container": "#eaedff",
                        "on-surface": "#131b2e",
                        "outline-variant": "#c2c6d2",
                        "on-background": "#131b2e",
                        "inverse-on-surface": "#eef0ff",
                        "primary-fixed": "#d4e3ff",
                        "primary": "#004782",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#c1d9ff",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#c8d9f3",
                        "surface": "#faf8ff",
                        "tertiary-fixed": "#d3e4fe",
                        "on-secondary-fixed-variant": "#00513a",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#424751",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#007151",
                        "secondary-fixed-dim": "#68dbae",
                        "secondary-fixed": "#86f8c9",
                        "on-tertiary-fixed-variant": "#38485d",
                        "surface-tint": "#1960a6",
                        "surface-container-highest": "#dae2fd",
                        "secondary": "#006c4e",
                        "inverse-primary": "#a4c9ff",
                        "surface-container-low": "#f2f3ff",
                        "surface-dim": "#d2d9f4",
                        "on-secondary-fixed": "#002115",
                        "on-primary": "#ffffff",
                        "secondary-container": "#83f5c6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#185fa5",
                        "background": "#faf8ff",
                        "primary-fixed-dim": "#a4c9ff",
                        "tertiary": "#38475c",
                        "on-primary-fixed-variant": "#004883",
                        "surface-container-high": "#e2e7ff",
                        "inverse-surface": "#283044",
                        "on-primary-fixed": "#001c39",
                        "tertiary-container": "#4f5f75",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "gutter": "16px",
                        "margin": "16px",
                        "sm": "8px",
                        "xl": "32px",
                        "base": "4px",
                        "xs": "4px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],
                        "headline-sm": ["18px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf8ff;
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- Top Navigation Bar -->
    <header class="bg-white dark:bg-slate-900 font-['Inter'] antialiased tracking-tight docked full-width top-0 sticky border-b border-slate-200 dark:border-slate-800 shadow-sm dark:shadow-none flex justify-between items-center px-4 py-3 w-full z-50">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="text-slate-500 hover:bg-slate-50 p-2 rounded-full transition-colors">
                <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            </button>
            <span class="text-xl font-bold text-[#185FA5] dark:text-blue-400">Vendas PAP</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="h-8 w-8 rounded-full bg-primary-fixed flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-sm" data-icon="person">person</span>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto max-w-lg px-margin py-xl">
        <!-- Registration Progress Section -->
        <div class="mb-xl">
            <div class="flex justify-between items-end mb-sm">
                <div>
                    <h1 class="text-headline-lg font-headline-lg text-primary">Cadastro</h1>
                    <p class="text-body-md font-body-md text-on-surface-variant">Etapa 1 de 4: Dados Pessoais</p>
                </div>
                <div class="text-label-md font-label-md text-primary bg-primary-fixed px-3 py-1 rounded-full">
                    25%
                </div>
            </div>
            <div class="w-full bg-outline-variant h-2 rounded-full overflow-hidden">
                <div class="bg-primary h-full rounded-full transition-all duration-500" style="width: 25%"></div>
            </div>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-xl shadow-[0px_2px_4px_rgba(15,23,42,0.05)] p-md border border-slate-100">
            <form id="registrationForm" class="space-y-lg">
                <!-- Full Name Field -->
                <div class="space-y-base">
                    <label class="text-label-md font-label-md text-on-surface-variant" for="full_name">Nome Completo</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="badge">badge</span>
                        <input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-md font-body-md placeholder:text-outline/50" id="full_name" placeholder="Digite seu nome completo" type="text" required/>
                    </div>
                </div>
                <!-- Document Field (CPF/RG/CNH/CNPJ) -->
                <div class="space-y-base">
                    <label class="text-label-md font-label-md text-on-surface-variant" for="documento">Documento (CPF/RG/CNH/CNPJ)</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="description">description</span>
                        <input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-md font-body-md placeholder:text-outline/50" id="documento" placeholder="Digite CPF, CNPJ, RG ou CNH" type="text" required maxlength="20"/>
                    </div>
                </div>
                <!-- WhatsApp Field -->
                <div class="space-y-base">
                    <label class="text-label-md font-label-md text-on-surface-variant" for="whatsapp">WhatsApp</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="phone">phone</span>
                        <input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-md font-body-md placeholder:text-outline/50" id="whatsapp" placeholder="(00) 00000-0000" type="text" required maxlength="15"/>
                    </div>
                </div>
                <!-- Email Field -->
                <div class="space-y-base">
                    <div class="flex justify-between">
                        <label class="text-label-md font-label-md text-on-surface-variant" for="email">E-mail</label>
                        <span class="text-label-sm font-label-sm text-outline italic">Opcional</span>
                    </div>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
                        <input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-md font-body-md placeholder:text-outline/50" id="email" placeholder="seu@email.com" type="email"/>
                    </div>
                </div>
                <!-- Birth Date Field -->
                <div class="space-y-base">
                    <label class="text-label-md font-label-md text-on-surface-variant" for="birthdate">Data de Nascimento</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="calendar_today">calendar_today</span>
                        <input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-md font-body-md appearance-none" id="birthdate" type="date" required/>
                    </div>
                </div>
                <!-- Submit Button -->
                <div class="pt-md">
                    <button type="submit" class="w-full bg-[#185FA5] text-white py-4 rounded-xl font-headline-sm text-headline-sm flex items-center justify-center gap-2 shadow-[0px_4px_12px_rgba(24,95,165,0.2)] hover:bg-primary-container transition-all active:scale-[0.98]">
                        Próximo
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
                    </button>
                </div>
            </form>
        </div>
        <!-- Supportive Visual Element -->
        <div class="mt-xl text-center">
            <p class="text-label-sm font-label-sm text-outline max-w-[280px] mx-auto">
                Seus dados estão protegidos conforme nossa Política de Privacidade e LGPD.
            </p>
        </div>
    </main>
    <!-- Bottom Spacing -->
    <div class="h-16 md:hidden"></div>

    <script>
        // Document Masking (Flexible for CPF/RG/CNH/CNPJ)
        const docInput = document.getElementById('documento');
        docInput.addEventListener('input', (e) => {
            let value = e.target.value;
            let numeric = value.replace(/\D/g, '');
            
            // Apply CPF mask (11 digits)
            if (numeric.length === 11) {
                value = numeric.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
                e.target.value = value;
            } 
            // Apply CNPJ mask (14 digits)
            else if (numeric.length === 14) {
                value = numeric.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
                e.target.value = value;
            }
        });

        // WhatsApp Masking
        const whatsappInput = document.getElementById('whatsapp');
        whatsappInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 10) {
                value = value.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            } else if (value.length > 5) {
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
            } else if (value.length > 2) {
                value = value.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
            } else if (value.length > 0) {
                value = value.replace(/^(\d{0,2})/, '($1');
            }
            
            e.target.value = value;
        });

        // Form submission logic
        const regForm = document.getElementById('registrationForm');
        regForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Save data to localStorage
            const userData = {
                nome: document.getElementById('full_name').value,
                documento: document.getElementById('documento').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                nascimento: document.getElementById('birthdate').value
            };
            localStorage.setItem('cadastro_pessoal', JSON.stringify(userData));
            
            window.location.href = 'cadastro_etapa2.html';
        });
    </script>
</body>
</html>
